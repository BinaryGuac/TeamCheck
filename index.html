<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Game Day Poll</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & BASE ───────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --pitch:   #0d1f0f;
  --turf:    #112613;
  --line:    #1e3d22;
  --panel:   #152418;
  --border:  #254d2a;
  --gold:    #f0c040;
  --green:   #4ade80;
  --red:     #f87171;
  --muted:   #6b8f71;
  --text:    #d4edda;
  --white:   #f0f7f1;
  --shadow:  rgba(0,0,0,0.5);
}

body {
  background: var(--pitch);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  padding: 0 0 60px;
  background-image:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 48px,
      rgba(255,255,255,0.012) 48px,
      rgba(255,255,255,0.012) 96px
    );
}

/* ── HEADER ─────────────────────────────────────────── */
header {
  background: linear-gradient(135deg, #0a1a0c 0%, #1a3d1e 100%);
  border-bottom: 2px solid var(--gold);
  padding: 28px 24px 22px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% -20%, rgba(240,192,64,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.header-badge {
  display: inline-block;
  background: var(--gold);
  color: #0a1a0c;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  padding: 3px 10px;
  border-radius: 2px;
  margin-bottom: 10px;
}
h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.2rem, 6vw, 3.8rem);
  color: var(--white);
  letter-spacing: 0.06em;
  line-height: 1;
  text-shadow: 0 2px 20px rgba(0,0,0,0.6);
}
h1 span { color: var(--gold); }
.header-sub {
  margin-top: 6px;
  color: var(--muted);
  font-size: 0.85rem;
  letter-spacing: 0.05em;
}

/* ── WHO AM I BAR ───────────────────────────────────── */
.who-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 14px 24px;
  background: var(--turf);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.who-bar label {
  font-size: 0.85rem;
  color: var(--muted);
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
#who {
  background: var(--panel);
  color: var(--white);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  min-width: 180px;
  transition: border-color 0.2s;
}
#who:focus { outline: none; border-color: var(--gold); }
#btn-done {
  background: var(--gold);
  color: #0a1a0c;
  border: none;
  border-radius: 8px;
  padding: 9px 28px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(240,192,64,0.25);
}
#btn-done:hover  { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(240,192,64,0.4); }
#btn-done:active { transform: scale(0.97); }
#btn-done:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.save-status {
  font-size: 0.82rem;
  color: var(--muted);
  min-width: 80px;
}
.save-status.ok  { color: var(--green); }
.save-status.err { color: var(--red); }

/* ── MAIN TABLE AREA ────────────────────────────────── */
.table-wrap {
  padding: 28px 16px 0;
  max-width: 1100px;
  margin: 0 auto;
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  min-width: 560px;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

/* HEAD */
thead th {
  background: var(--panel);
  padding: 12px 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  white-space: nowrap;
  text-align: center;
  border-bottom: 2px solid var(--border);
}
thead th:first-child { text-align: left; padding-left: 18px; min-width: 140px; }
.date-header { display: block; color: var(--white); font-size: 0.9rem; font-weight: 700; letter-spacing: 0.02em; }
.day-label   { display: block; color: var(--gold); font-size: 0.68rem; margin-top: 2px; }

/* BODY */
tbody tr { transition: background 0.15s; }
tbody tr:nth-child(odd)  { background: #16a34a; }
tbody tr:nth-child(even) { background: #86efac; }
tbody tr:hover           { background: #22c55e; }

td {
  padding: 9px 8px;
  text-align: center;
  border-bottom: 1px solid #15803d;
  vertical-align: middle;
  color: #0a2e10;
}
td:first-child {
  text-align: left;
  padding-left: 18px;
  font-weight: 600;
  font-size: 0.92rem;
  color: #0a2e10;
  white-space: nowrap;
}

/* SELECT DROPDOWNS */
select.pick {
  background: rgba(255,255,255,0.35);
  color: #0a2e10;
  border: 1px solid #15803d;
  border-radius: 6px;
  padding: 5px 6px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  cursor: pointer;
  width: 86px;
  transition: border-color 0.2s, background 0.2s;
  -webkit-appearance: none;
  appearance: none;
  text-align: center;
}
select.pick:focus    { outline: none; border-color: #0a2e10; }
select.pick.is-out   { background: rgba(180,0,0,0.15); border-color: #7f0000; color: #7f0000; }
select.pick.is-in    { background: rgba(10,60,20,0.2);  border-color: #0a2e10; color: #0a2e10; }
select.pick:disabled { opacity: 0.5; cursor: not-allowed; }

/* OTHER PLAYERS — read-only pills */
.pill {
  display: inline-block;
  padding: 4px 11px;
  border-radius: 20px;
  font-size: 0.78rem;
  font-weight: 600;
  white-space: nowrap;
}
.pill-out   { background: rgba(180,0,0,0.15); color: #7f0000; border: 1px solid rgba(180,0,0,0.4); }
.pill-in    { background: rgba(10,60,20,0.2); color: #0a2e10; border: 1px solid rgba(10,60,20,0.4); }
.pill-empty { color: #15803d; font-size: 0.75rem; }

/* SUMMARY ROW */
tfoot tr { background: var(--panel) !important; }
tfoot td {
  padding: 11px 8px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--gold);
  border-top: 2px solid var(--border);
  text-align: center;
}
tfoot td:first-child { text-align: left; padding-left: 18px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-size: 0.72rem; }
.count-badge {
  display: inline-block;
  background: rgba(240,192,64,0.15);
  border: 1px solid rgba(240,192,64,0.3);
  border-radius: 4px;
  padding: 2px 8px;
  font-size: 0.85rem;
}

/* ── MODAL ───────────────────────────────────────────── */
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
#overlay.show { display: flex; }
#modal {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 36px;
  text-align: center;
  max-width: 380px;
  width: 92%;
  animation: pop 0.25s ease;
}
@keyframes pop {
  from { transform: scale(0.88); opacity: 0; }
  to   { transform: scale(1);    opacity: 1; }
}
.modal-emoji { font-size: 3.2rem; margin-bottom: 14px; }
.modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 0.06em; color: var(--white); margin-bottom: 10px; }
.modal-msg   { color: var(--muted); font-size: 0.95rem; line-height: 1.55; }
.modal-close {
  margin-top: 26px;
  background: var(--gold);
  color: #0a1a0c;
  border: none;
  border-radius: 7px;
  padding: 10px 32px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: transform 0.1s;
}
.modal-close:hover { transform: translateY(-1px); }

/* ── SPINNER ─────────────────────────────────────────── */
#loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-size: 0.9rem;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.refresh-note {
  text-align: center;
  color: var(--line);
  font-size: 0.75rem;
  margin-top: 20px;
  padding: 0 16px;
}
</style>
</head>
<body>

<!-- ════════════════════════════════════════════
     ⚙️  CONFIGURATION  — edit these 5 values
     ════════════════════════════════════════════ -->
<script>
const CONFIG = {
  // --- Google Sheets logging ---
  SHEETS_URL: "https://script.google.com/macros/s/AKfycbyDU3O6gydWsDEMbLVeY524Zryv7zu8MJpS-GQR_Ts6nOS20XZ67TPYl2D0aWHZ9KyBnw/exec",

  // --- GitHub storage ---
  GITHUB_OWNER: "BinaryGuac",   // e.g. "johndoe"
  GITHUB_REPO:  "TeamCheck",         // e.g. "game-poll"
  GITHUB_TOKEN: "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", // ghp_xxxxxxxxxxxx
  GITHUB_FILE:  "data.json",              // file path in repo

  // --- Schedule ---
  GAME_DAY: "saturday",   // "saturday" or "sunday"
  WEEKS_AHEAD: 2,         // how many additional weeks to show

  // --- Players (up to 20) ---
  PLAYERS: [
    "Alex", "Bruno", "Carlos", "David", "Eric",
    "Fabio", "George", "Henri", "Ivan", "Jules",
    "Kevin", "Luca", "Marco", "Nico", "Omar",
    "Pedro", "Quentin", "Rafael", "Sam", "Tomas"
  ]
};
</script>
<!-- ═══════════════════════════════════════════ -->

<header>
  <div class="header-badge">⚽ WEEKLY AVAILABILITY</div>
  <h1>GAME <span>DAY</span> POLL</h1>
  <p class="header-sub">Select your availability — coming weekend is required, following weeks are optional</p>
</header>

<div class="who-bar">
  <label for="who">👤 I am:</label>
  <select id="who">
    <option value="">— select your name —</option>
  </select>
  <button id="btn-done" disabled>CONFIRM MY AVAILABILITY</button>
  <div class="save-status" id="save-status"></div>
</div>

<div class="table-wrap">
  <div id="loading">
    <div class="spinner"></div>
    Loading team data…
  </div>
  <table id="poll-table" style="display:none">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
    <tfoot id="tfoot"></tfoot>
  </table>
</div>

<p class="refresh-note">Page auto-refreshes every 60 s to show teammates' updates</p>

<!-- Modal -->
<div id="overlay">
  <div id="modal">
    <div class="modal-emoji" id="modal-emoji"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-msg"   id="modal-msg"></div>
    <button class="modal-close" onclick="closeModal()">OK</button>
  </div>
</div>

<script>
// ── GITHUB API HELPERS ───────────────────────────────────────────
const GH_BASE = `https://api.github.com/repos/${CONFIG.GITHUB_OWNER}/${CONFIG.GITHUB_REPO}/contents/${CONFIG.GITHUB_FILE}`;

async function ghFetch(method, body) {
  const opts = {
    method,
    headers: {
      Authorization: `token ${CONFIG.GITHUB_TOKEN}`,
      Accept: "application/vnd.github+json",
      "Content-Type": "application/json"
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(GH_BASE, opts);
  if (!r.ok) throw new Error(`GitHub ${r.status}: ${await r.text()}`);
  return r.json();
}

async function loadData() {
  try {
    const res = await ghFetch("GET");
    const json = JSON.parse(atob(res.content.replace(/\n/g, "")));
    return { data: json, sha: res.sha };
  } catch (e) {
    // File might not exist yet
    if (e.message.includes("404")) return { data: {}, sha: null };
    throw e;
  }
}

async function saveData(data, sha) {
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  const body = {
    message: "Update poll data",
    content,
    ...(sha ? { sha } : {})
  };
  const res = await ghFetch("PUT", body);
  return res.content.sha;
}

// ── DATE HELPERS ─────────────────────────────────────────────────
function getGameDates() {
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const targetDay = CONFIG.GAME_DAY.toLowerCase() === "sunday" ? 0 : 6;

  // Find the NEXT occurrence of game day (today counts if it IS game day)
  const d = new Date(today);
  while (d.getDay() !== targetDay) d.setDate(d.getDate() + 1);

  const dates = [];
  for (let i = 0; i <= CONFIG.WEEKS_AHEAD; i++) {
    const dd = new Date(d);
    dd.setDate(d.getDate() + i * 7);
    dates.push(dd);
  }
  return dates;
}

function fmtDate(d) {
  // Key used in data storage: YYYY-MM-DD
  return d.toISOString().slice(0, 10);
}

function fmtDisplay(d) {
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
}

function fmtDay(d) {
  return d.toLocaleDateString("en-US", { weekday: "short" }).toUpperCase();
}

// ── MAIN STATE ───────────────────────────────────────────────────
let pollData = {};
let fileSha  = null;
let gameDates = [];
let currentPlayer = "";

// ── BUILD UI ─────────────────────────────────────────────────────
function buildWhoSelect() {
  const sel = document.getElementById("who");
  CONFIG.PLAYERS.forEach(p => {
    const o = document.createElement("option");
    o.value = o.textContent = p;
    sel.appendChild(o);
  });
  sel.addEventListener("change", () => {
    currentPlayer = sel.value;
    renderTable();
    document.getElementById("btn-done").disabled = !currentPlayer;
  });
}

function renderTable() {
  gameDates = getGameDates();

  // ── HEAD
  const thead = document.getElementById("thead");
  thead.innerHTML = "";
  const hr = document.createElement("tr");
  const th0 = document.createElement("th");
  th0.textContent = "Player";
  hr.appendChild(th0);
  gameDates.forEach(d => {
    const th = document.createElement("th");
    th.innerHTML = `<span class="date-header">${fmtDisplay(d)}</span><span class="day-label">${fmtDay(d)}</span>`;
    hr.appendChild(th);
  });
  thead.appendChild(hr);

  // ── BODY
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  CONFIG.PLAYERS.forEach(player => {
    const tr = document.createElement("tr");
    const nameTd = document.createElement("td");
    nameTd.textContent = player;
    if (player === currentPlayer) {
      nameTd.style.color = "var(--gold)";
    }
    tr.appendChild(nameTd);

    gameDates.forEach(d => {
      const key = fmtDate(d);
      const stored = pollData[player]?.[key];
      const td = document.createElement("td");

      if (player === currentPlayer) {
        // Editable dropdown
        const sel = document.createElement("select");
        sel.className = "pick";
        sel.dataset.date = key;

        const opts = [
          { v: "",    l: "–" },
          { v: "OUT", l: "⛔ OUT" },
          { v: "1",   l: "👤 +1" },
          { v: "2",   l: "👥 +2" },
          { v: "3",   l: "👥 +3" },
          { v: "4",   l: "👥 +4" },
          { v: "5",   l: "👥 +5" },
        ];
        opts.forEach(o => {
          const op = document.createElement("option");
          op.value = o.v; op.textContent = o.l;
          sel.appendChild(op);
        });

        if (stored !== undefined) sel.value = stored;
        updateSelectClass(sel);
        sel.addEventListener("change", () => updateSelectClass(sel));
        td.appendChild(sel);
      } else {
        // Read-only pill
        td.innerHTML = pillHTML(stored);
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });

  // ── FOOT — totals per date
  const tfoot = document.getElementById("tfoot");
  tfoot.innerHTML = "";
  const fr = document.createElement("tr");
  const ftd0 = document.createElement("td");
  ftd0.textContent = "Total attending";
  fr.appendChild(ftd0);

  gameDates.forEach(d => {
    const key = fmtDate(d);
    let total = 0;
    CONFIG.PLAYERS.forEach(p => {
      const v = pollData[p]?.[key];
      if (v && v !== "OUT") total += 1 + parseInt(v, 10);
    });
    const td = document.createElement("td");
    td.innerHTML = total > 0
      ? `<span class="count-badge">⚽ ${total}</span>`
      : `<span style="color:var(--line)">—</span>`;
    fr.appendChild(td);
  });
  tfoot.appendChild(fr);

  document.getElementById("loading").style.display = "none";
  document.getElementById("poll-table").style.display = "";
}

function updateSelectClass(sel) {
  sel.classList.remove("is-out", "is-in");
  if (sel.value === "OUT") sel.classList.add("is-out");
  else if (sel.value !== "") sel.classList.add("is-in");
}

function pillHTML(val) {
  if (val === undefined || val === "") return `<span class="pill-empty">–</span>`;
  if (val === "OUT") return `<span class="pill pill-out">⛔ OUT</span>`;
  const n = parseInt(val, 10);
  const label = n === 1 ? "+1" : `+${n}`;
  return `<span class="pill pill-in">✅ ${label}</span>`;
}

// ── DONE / SAVE ──────────────────────────────────────────────────
document.getElementById("btn-done").addEventListener("click", async () => {
  if (!currentPlayer) return;

  const selects = document.querySelectorAll("select.pick");
  let allOut = true;
  let anySet = false;

  selects.forEach(sel => {
    const date = sel.dataset.date;
    const val  = sel.value;
    if (!pollData[currentPlayer]) pollData[currentPlayer] = {};
    pollData[currentPlayer][date] = val;
    if (val !== "OUT" && val !== "") allOut = false;
    if (val !== "") anySet = true;
  });

  const statusEl = document.getElementById("save-status");
  const btn = document.getElementById("btn-done");
  btn.disabled = true;
  statusEl.textContent = "Saving…";
  statusEl.className = "save-status";

  // Prune old dates (keep only current game dates)
  const validKeys = new Set(gameDates.map(fmtDate));
  if (pollData[currentPlayer]) {
    Object.keys(pollData[currentPlayer]).forEach(k => {
      if (!validKeys.has(k)) delete pollData[currentPlayer][k];
    });
  }

  try {
    fileSha = await saveData(pollData, fileSha);
    logToSheets("confirm", currentPlayer, anySet && !allOut ? "in" : "out");
    statusEl.textContent = "✓ Saved!";
    statusEl.className = "save-status ok";
    btn.disabled = false;

    // Modal
    const allOutForAll = !anySet || (anySet && allOut);
    if (!anySet || allOut) {
      showModal("😢", "Too bad!", "See you next time! We'll miss you on the pitch.");
    } else {
      showModal("📲", "You're in!", "We'll message you to confirm once we have enough players. Stay ready!");
    }
  } catch (e) {
    console.error(e);
    statusEl.textContent = "❌ Save failed — check your GitHub token/config.";
    statusEl.className = "save-status err";
    btn.disabled = false;
  }
});

// ── MODAL ────────────────────────────────────────────────────────
function showModal(emoji, title, msg) {
  document.getElementById("modal-emoji").textContent = emoji;
  document.getElementById("modal-title").textContent = title;
  document.getElementById("modal-msg").textContent   = msg;
  document.getElementById("overlay").classList.add("show");
}
function closeModal() {
  document.getElementById("overlay").classList.remove("show");
}

// ── GOOGLE SHEETS LOGGING ────────────────────────────────────────
function logToSheets(event, player, extra) {
  const payload = {
    timestamp:  new Date().toISOString(),
    event,
    player:     player || "—",
    userAgent:  navigator.userAgent,
    language:   navigator.language,
    screenSize: `${screen.width}x${screen.height}`,
    extra:      extra || ""
  };
  // fire-and-forget — don't block the UI
  fetch(CONFIG.SHEETS_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  }).catch(() => {});
}

// ── INIT & AUTO-REFRESH ──────────────────────────────────────────
async function init() {
  buildWhoSelect();
  logToSheets("page_load", null, document.referrer || "direct");
  try {
    const { data, sha } = await loadData();
    pollData = data;
    fileSha  = sha;
  } catch (e) {
    document.getElementById("loading").innerHTML =
      `<p style="color:var(--red)">⚠️ Could not load data.<br><small>${e.message}</small></p>`;
    return;
  }
  renderTable();
}

async function refreshData() {
  try {
    const { data, sha } = await loadData();
    pollData = data;
    fileSha  = sha;
    renderTable();
  } catch (_) { /* silent */ }
}

init();
setInterval(refreshData, 60_000);
</script>
</body>
</html>
